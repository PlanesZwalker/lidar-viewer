server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── CORS + Range Requests (required for COPC streaming) ─────────────────
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, Content-Type" always;
    add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range" always;

    # SharedArrayBuffer headers (required for LAZ WASM decoders)
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── Static point cloud files ─────────────────────────────────────────────
    location /pointclouds/ {
        alias /data/pointclouds/;
        # Enable HTTP range requests for COPC chunk streaming
        add_header Accept-Ranges bytes always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Range, Content-Length" always;
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm font/woff2;
    gzip_min_length 1000;
}
